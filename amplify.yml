version: 1

backend:
  phases:
    preBuild:
      commands:
        - corepack enable
        - yarn install --frozen-lockfile
    build:
      commands:
        - yarn ts-check
        - yarn deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
  cache:
    paths:
      - node_modules/**/*
      - .yarn/cache/**/*
