version: 1

backend:
  phases:
    preBuild:
      commands:
        - corepack enable
        - yarn install --frozen-lockfile
    build:
      commands:
        - yarn ts-check
        - yarn deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID

frontend:
  phases:
    build:
      commands:
        - mkdir -p dist
        - echo "Backend deployment only" > dist/index.html
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .yarn/cache/**/*
